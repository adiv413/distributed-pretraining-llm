[job]
dump_folder = "./outputs"
description = "TP=8 on 8 GPUs"

[profiling]
enable_profiling = false

[metrics]
log_freq = 1
enable_tensorboard = false
enable_wandb = false

[model]
name = "llama3"
flavor = "1B"
hf_assets_path = "./tests/assets/tokenizer"

[optimizer]
name = "AdamW"
lr = 3e-4
eps = 1e-8

[lr_scheduler]
warmup_steps = 20
decay_ratio = 0.8
decay_type = "linear"
min_lr_factor = 0.1

[training]
local_batch_size = 16
seq_len = 2048
max_norm = 1.0
steps = 550
dataset = "c4_test"

[parallelism]
data_parallel_replicate_degree = 1
data_parallel_shard_degree = 1
tensor_parallel_degree = 8
pipeline_parallel_degree = 1
context_parallel_degree = 1

[checkpoint]
enable = false

[activation_checkpoint]
mode = "none"

[compile]
enable = false

[validation]
enable = false
